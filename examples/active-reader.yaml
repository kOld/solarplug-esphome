substitutions:
  name: solarplug-active
  friendly_name: Solar Plug Active Reader

packages:
  solarplug_reader: !include ../packages/solarplug-read-minimal.yaml

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  comment: Read-only Solar Plug-RWB1 replacement. Disconnect the original dongle before active use.
  min_version: 2026.1.2

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: INFO

api:
  encryption:
    key: !secret api_key
  reboot_timeout: 0min

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "SolarPlug Active"
    password: !secret ap_password
  reboot_timeout: 0min

captive_portal:

uart:
  id: uart_main
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 2400
  data_bits: 8
  parity: NONE
  stop_bits: 1

external_components:
  - source: github://kOld/solarplug-esphome@main
    components: [solarplug]
    refresh: 1d
